# Redis configuration for AI PPT Generator
bind 0.0.0.0
port 6379

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (for job state durability)
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Disable dangerous commands in production (keep enabled for dev)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""

# Connection limits
maxclients 100

# TCP settings
tcp-backlog 511
tcp-keepalive 300

# Timeout for idle connections
timeout 0
