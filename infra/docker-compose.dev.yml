
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aippt
      POSTGRES_USER: aippt
      POSTGRES_PASSWORD: aipptdev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aippt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aippt:aipptdev@postgres:5432/aippt
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    volumes:
      - ../apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://aippt:aipptdev@postgres:5432/aippt
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=development
    volumes:
      - ../apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A workers.celery_app worker
      --loglevel=info
      --concurrency=4
      --without-heartbeat
      --without-gossip
      --without-mingle

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - ../apps/web/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  export-service:
    build:
      context: ../services/export
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_EXPORT_BUCKET:-aippt-exports}
      - MAIN_API_URL=http://api:8000
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    volumes:
      - ../services/export:/app
      - ../services/export/fonts:/app/fonts:ro
    depends_on:
      - api
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  ingestion-service:
    build:
      context: ../services/ingestion
      dockerfile: Dockerfile.dev
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379/1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_RAW_DOCUMENTS_BUCKET=${S3_RAW_DOCUMENTS_BUCKET}
      - ENVIRONMENT=development
    depends_on:
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  ingestion-worker:
    build:
      context: ../services/ingestion
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q ingestion

volumes:
  postgres_data:
  redis_data:
